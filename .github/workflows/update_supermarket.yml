name: Update Supermarket JSON Daily

on:
  push:
  # schedule:
  #   - cron: '0 0 * * *'  # 12 AM UTC daily
  # workflow_dispatch:      # Manual trigger option

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      # --- Step 1: Checkout current repo ---
      - name: Checkout current repo
        uses: actions/checkout@v4

      # --- Step 2: Set up Python ---
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # --- Step 3: Install dependencies (if needed) ---
      - name: Install dependencies
        run: |
          # Only install if requirements.txt exists
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # --- Step 4: Run Python script to generate supermarkets_merged.json ---
      - name: Generate supermarkets_merged.json
        run: |
          python merge_supermarkets.py  

      # --- Step 5: Push to target repository ---
      - name: Push to target repo
        env:
          TARGET_REPO: "https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/ComPears/compear.git"
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"

          # Clone target repo
          git clone $TARGET_REPO target-repo
          pwd
          # Copy supermarkets_merged.json to target repo
          cp supermarkets_merged.json target-repo/

          # Commit and push
          cd target-repo
          git add .
          git commit -m "Automated update: supermarkets_merged.json $(date +'%Y-%m-%d %H:%M:%S')"
          git push