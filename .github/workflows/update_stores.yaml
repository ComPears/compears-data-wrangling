name: Daily supermarket scrapers

# Runs all Python store scrapers daily at 00:00 UTC and commits updated JSON to this repo.
# Backend seed picks up these files weekly via ComPears/compear-backend (.github/workflows/seed-backend.yml, Mon 06:00 UTC).
# Downstream jobs (prune, backend sync) run when at least one store scraper succeeds.

on:
  # push:
  schedule:
    - cron: '0 0 * * *'  # 12 AM UTC daily
  workflow_dispatch:      # Manual trigger option

jobs:
  generate-ah:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Step 1: Checkout current repo ---
      - name: Checkout current repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN}}

      # --- Step 2: Set up Python ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'
          check-latest: false

      # --- Step 3: Install dependencies (if needed) ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # --- Step 4a: Run Python script to generate AH structured_all_merged.json ---
      - name: Generate NL Albert Heijn catalog
        run: python scripts/run_store_pipeline.py --store albert-heijn

      # --- Step 5: Push to Repo
      - name: Push files to repo
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git pull
          # mv structured_all_merged.json AH/
          git add countries/nl/albert-heijn/structured_all_merged.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update  $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
  
  generate-aldi:
    # needs: [generate-ah]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Step 1: Checkout current repo ---
      - name: Checkout current repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN}}

      # --- Step 2: Set up Python ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'
          check-latest: false

      # --- Step 3: Install dependencies (if needed) ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Playwright browsers
        run: |
          python -m playwright install
          python -m playwright install-deps

      # --- Step 4a: Run Python script to generate ALDI structured_aldi.json ---
      - name: Generate NL ALDI catalog
        run: python scripts/run_store_pipeline.py --store aldi

      # --- Step 5: Push to Repo
      - name: Push files to repo
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git pull
          # mv structured_aldi.json ALDI/
          git add countries/nl/aldi/structured_aldi.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update  $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

