            git push
          fi

  generate-plus:
    # needs: [generate-dirk]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Step 1: Checkout current repo ---
      - name: Checkout current repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN}}

      # --- Step 2: Set up Python ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
