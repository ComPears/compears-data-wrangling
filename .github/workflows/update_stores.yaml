        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git pull
          git add supermarkets.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update  $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

      # --- Step 5: Push to target repository ---
      - name: Push to target repo
        env:
          TARGET_REPO: "https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/ComPears/compear.git"
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"

          # Clone target repo
          git clone $TARGET_REPO target-repo
          pwd
          #Copy supermarkets_merged.json to target repo
          cp supermarkets.json target-repo/src/data

          # Commit and push
          cd target-repo
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update: supermarkets_merged.json $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi