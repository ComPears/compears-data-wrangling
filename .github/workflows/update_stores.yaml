  prune-stale-data:
    needs: [generate-ah, generate-aldi, generate-dirk, generate-plus, generate-lidl, generate-coop, generate-jumbo]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'
          check-latest: false

      - name: Sanitize canonical product JSON
        run: python scripts/sanitize_all_stores.py

      - name: Validate data quality
        run: python scripts/validate_products.py

      - name: Remove stale intermediate JSON from repo
        run: python scripts/prune_stale_artifacts.py --from-git

      - name: Commit and push prune
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git pull --rebase
          git add -A
          if git diff --cached --quiet; then
            echo "No stale files to remove"
          else
            git commit -m "Prune stale scrape artifacts $(date -u +'%Y-%m-%d %H:%M:%SZ')"
            git push
          fi

  sync-backend-and-render:
    needs: [prune-stale-data]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout data-wrangling repo
        uses: actions/checkout@v7
        with:
          path: compears-data-wrangling

      - name: Checkout backend repo
        uses: actions/checkout@v7
        with:
          repository: ComPears/compear-backend
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: compear-backend

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: compear-backend/package-lock.json

      - name: Seed backend product data
        working-directory: compear-backend
        env:
          WRANGLING_PATH: ${{ github.workspace }}/compears-data-wrangling
        run: |
          npm ci
          npm run seed

      - name: Push seeded data to backend repo
        working-directory: compear-backend
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          git config user.name "$GIT_USERNAME"
          git config user.email "$GIT_EMAIL"
          git add src/data/*.json
          if git diff --cached --quiet; then
            echo "No backend data changes to commit"
          else
            git commit -m "Automated data sync $(date -u +'%Y-%m-%d %H:%M:%SZ')"
            git push
          fi

      - name: Trigger Render backend redeploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render redeploy"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered"