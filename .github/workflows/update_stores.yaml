          git pull
          # mv jumbo_structured.json JUMBO/
          git add countries/nl/jumbo/jumbo_structured.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update  $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

  prune-stale-data:
    needs: [generate-ah, generate-aldi, generate-dirk, generate-plus, generate-lidl, generate-coop, generate-jumbo]
    if: >-
      always() && !cancelled() && (
        needs.generate-ah.result == 'success' ||
        needs.generate-aldi.result == 'success' ||
        needs.generate-dirk.result == 'success' ||
        needs.generate-plus.result == 'success' ||
        needs.generate-lidl.result == 'success' ||
        needs.generate-coop.result == 'success' ||
        needs.generate-jumbo.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync to latest main
        run: git pull --rebase origin main

      - name: Report partial scrape run
        run: |
          echo "Scrape results:"
          echo "  AH:    ${{ needs.generate-ah.result }}"
          echo "  ALDI:  ${{ needs.generate-aldi.result }}"
          echo "  DIRK:  ${{ needs.generate-dirk.result }}"
          echo "  PLUS:  ${{ needs.generate-plus.result }}"
          echo "  LIDL:  ${{ needs.generate-lidl.result }}"
          echo "  COOP:  ${{ needs.generate-coop.result }}"
          echo "  JUMBO: ${{ needs.generate-jumbo.result }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'
          check-latest: false

      - name: Sanitize canonical product JSON
        run: python scripts/sanitize_all_stores.py

      - name: Validate store output counts
        run: python scripts/validate_store_output.py

      - name: Validate data quality
        continue-on-error: true
        run: python scripts/validate_products.py

      - name: Test catalog health reporting
        run: python -m unittest discover -s tests -t . -v

      - name: Generate catalog health report
        run: python scripts/catalog_health.py --fail-on error

      - name: Upload catalog health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-health
          path: reports/catalog-health.json
          if-no-files-found: error

      - name: Remove stale intermediate JSON from repo
        run: python scripts/prune_stale_artifacts.py --from-git

      - name: Commit sanitize and prune changes
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sanitize catalog and prune stale artifacts $(date -u +'%Y-%m-%d %H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main

  sync-backend-and-render:
    needs: [generate-ah, generate-aldi, generate-dirk, generate-plus, generate-lidl, generate-coop, generate-jumbo, prune-stale-data]
    if: >-
      always() && !cancelled() && (
        needs.generate-ah.result == 'success' ||
        needs.generate-aldi.result == 'success' ||
        needs.generate-dirk.result == 'success' ||
        needs.generate-plus.result == 'success' ||
        needs.generate-lidl.result == 'success' ||
        needs.generate-coop.result == 'success' ||
        needs.generate-jumbo.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout data-wrangling repo
        uses: actions/checkout@v7
        with:
          ref: main
          path: compears-data-wrangling
          fetch-depth: 0

      - name: Sync data-wrangling to latest main
        working-directory: compears-data-wrangling
        run: git pull --rebase origin main

      - name: Checkout backend repo
        uses: actions/checkout@v7
        with:
          repository: ComPears/compear-backend
          ref: main
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: compear-backend
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: compear-backend/package-lock.json

      - name: Seed backend product data
        working-directory: compear-backend
        env:
          WRANGLING_PATH: ${{ github.workspace }}/compears-data-wrangling
        run: |
          npm ci
          npm run seed

      - name: Push seeded data to backend repo
        working-directory: compear-backend
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          git config user.name "$GIT_USERNAME"
          git config user.email "$GIT_EMAIL"
          git add src/data/nl/*.json
          if git diff --cached --quiet; then
            echo "No backend data changes to commit"
          else
            git commit -m "Automated data sync $(date -u +'%Y-%m-%d %H:%M:%SZ')"
            git push
          fi

      - name: Trigger Render backend redeploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render redeploy"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered"

  scrape-summary:
    needs: [generate-ah, generate-aldi, generate-dirk, generate-plus, generate-lidl, generate-coop, generate-jumbo, prune-stale-data, sync-backend-and-render]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest catalog state
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python for monitoring
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'
          check-latest: false

      - name: Alert on zero, suspicious, or stale catalogs
        id: catalog-monitor
        continue-on-error: true
        env:
          CATALOG_MAX_AGE_HOURS: '72'
          CATALOG_MAX_DROP_RATIO: '0.5'
          CATALOG_MAX_GROWTH_RATIO: '3'
        run: python scripts/workflow_catalog_alerts.py

      - name: Summarize scrape pipeline
        run: |
          echo "Store scrapers:"
          echo "  AH=${{ needs.generate-ah.result }} ALDI=${{ needs.generate-aldi.result }} DIRK=${{ needs.generate-dirk.result }}"
          echo "  PLUS=${{ needs.generate-plus.result }} LIDL=${{ needs.generate-lidl.result }} COOP=${{ needs.generate-coop.result }} JUMBO=${{ needs.generate-jumbo.result }}"
          echo "Post-process: prune=${{ needs.prune-stale-data.result }} sync=${{ needs.sync-backend-and-render.result }}"

      - name: Fail only when every store scraper failed
        if: >-
          needs.generate-ah.result != 'success' &&
          needs.generate-aldi.result != 'success' &&
          needs.generate-dirk.result != 'success' &&
          needs.generate-plus.result != 'success' &&
          needs.generate-lidl.result != 'success' &&
          needs.generate-coop.result != 'success' &&
          needs.generate-jumbo.result != 'success'
        run: |
          echo "All store scrapers failed — no catalog updates this run."
          exit 1

      - name: Warn on partial scrape failure
        if: >-
          (
            needs.generate-ah.result != 'success' ||
            needs.generate-aldi.result != 'success' ||
            needs.generate-dirk.result != 'success' ||
            needs.generate-plus.result != 'success' ||
            needs.generate-lidl.result != 'success' ||
            needs.generate-coop.result != 'success' ||
            needs.generate-jumbo.result != 'success'
          ) && (
            needs.generate-ah.result == 'success' ||
            needs.generate-aldi.result == 'success' ||
            needs.generate-dirk.result == 'success' ||
            needs.generate-plus.result == 'success' ||
            needs.generate-lidl.result == 'success' ||
            needs.generate-coop.result == 'success' ||
            needs.generate-jumbo.result == 'success'
          )
        run: echo "::warning::Some store scrapers failed; successful stores were still merged and synced."

      - name: Fail on catalog monitoring alerts
        if: always() && steps.catalog-monitor.outcome == 'failure'
        run: |
          echo "::error::Catalog monitoring found zero, suspicious, or stale data. See the Catalog monitoring job summary."
          exit 1