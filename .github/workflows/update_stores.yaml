        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git pull
          # mv dirk_all.json DIRK/
          git add countries/nl/dirk/dirk_all.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
