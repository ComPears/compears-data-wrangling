      # --- Step 5: Push to Repo
      - name: Push files to repo
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
