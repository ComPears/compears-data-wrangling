name: Supermarket JSON 

on:
  push:
  schedule:
    - cron: '0 0 * * *'  # 12 AM UTC daily
  workflow_dispatch:      # Manual trigger option

jobs:
  generate-ah:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Step 1: Checkout current repo ---
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN}}

      # --- Step 2: Set up Python ---
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # --- Step 3: Install dependencies (if needed) ---
      - name: Install dependencies
        run: |
          # Only install if requirements.txt exists
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Install Playwright browsers
        run: python -m playwright install
      
      

      # --- Step 4a: Run Python script to generate AH structured_all_merged.json ---
      - name: Generate AH structured_all_merged.json
        run: |
          # playwright install-deps 
          cd AH
          python main.py
          python merge.py
          python struc.py
          python clean_ah.py

      # --- Step 5: Push to Repo
      - name: Push files to repo
        env:
          GIT_USERNAME: "GitHub Actions Bot"
          GIT_EMAIL: "actions@github.com"
        run: |
          # Configure Git
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"
          git pull
          # mv structured_all_merged.json AH/
          git add AH/structured_all_merged.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update  $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
  
